services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quran
      POSTGRES_PASSWORD: quran
      POSTGRES_DB: quran
    ports:
      - "5432:5432"
    volumes:
      - quran_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quran"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://quran:quran@postgres:5432/quran
      JWT_SECRET_KEY: dev-secret-change-me
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  quran_pg_data:
